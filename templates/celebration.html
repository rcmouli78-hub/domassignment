<!-- Celebration Animation CSS -->
<style>
  .celebration-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .flower {
    position: absolute;
    font-size: 30px;
    animation: fall linear infinite;
    pointer-events: none;
  }

  @keyframes fall {
    0% {
      transform: translateY(-100vh) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) rotate(360deg);
      opacity: 0;
    }
  }

  .congratulations-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 2rem;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    z-index: 10000;
    animation: bounceIn 0.8s ease-out;
    max-width: 400px;
    width: 90%;
  }

  @keyframes bounceIn {
    0% {
      transform: translate(-50%, -50%) scale(0.3);
      opacity: 0;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.05);
    }
    70% {
      transform: translate(-50%, -50%) scale(0.9);
    }
    100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
  }

  .trophy-icon {
    font-size: 4rem;
    color: #ffd700;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.1);
    }
    100% {
      transform: scale(1);
    }
  }

  .celebration-text {
    margin: 1rem 0;
  }

  .celebration-text h3 {
    margin-bottom: 0.5rem;
    font-weight: 700;
  }

  .celebration-text p {
    opacity: 0.9;
    margin-bottom: 0;
  }

  .close-celebration {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid white;
    color: white;
    padding: 0.5rem 1.5rem;
    border-radius: 25px;
    margin-top: 1rem;
    transition: all 0.3s ease;
  }

  .close-celebration:hover {
    background: white;
    color: #667eea;
    transform: translateY(-2px);
  }
</style>

<!-- Celebration Overlay -->
{% if show_celebration %}
<div class="celebration-overlay" id="celebrationOverlay">
  <!-- Falling flowers will be added here by JavaScript -->
</div>

<div class="congratulations-modal" id="congratulationsModal">
  <div class="trophy-icon">🏆</div>
  <div class="celebration-text">
    <h3>🎉 PERFECT SCORE! 🎉</h3>
    <p>Congratulations! You solved this problem perfectly on your first attempt!</p>
    <p><strong>Excellent work!</strong></p>
  </div>
  <button class="btn close-celebration" onclick="closeCelebration()">Continue</button>
</div>

<!-- Celebration Script -->
<script>
  // Flower emojis for the animation
  const flowers = ['🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🌼', '🏵️', '🌟', '✨', '🎊', '🎉'];
  
  function createFlower() {
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
    
    // Random position and animation duration
    flower.style.left = Math.random() * 100 + '%';
    flower.style.animationDuration = (Math.random() * 3 + 2) + 's';
    flower.style.animationDelay = Math.random() * 2 + 's';
    
    return flower;
  }
  
  function startCelebration() {
    const overlay = document.getElementById('celebrationOverlay');
    
    // Create multiple flowers
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const flower = createFlower();
        overlay.appendChild(flower);
        
        // Remove flower after animation
        setTimeout(() => {
          if (flower.parentNode) {
            flower.parentNode.removeChild(flower);
          }
        }, 5000);
      }, i * 100);
    }
  }
  
  function closeCelebration() {
    const modal = document.getElementById('congratulationsModal');
    const overlay = document.getElementById('celebrationOverlay');
    
    modal.style.animation = 'fadeOut 0.5s ease-out forwards';
    overlay.style.animation = 'fadeOut 0.5s ease-out forwards';
    
    setTimeout(() => {
      modal.style.display = 'none';
      overlay.style.display = 'none';
    }, 500);
  }
  
  // Add fadeOut animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }
  `;
  document.head.appendChild(style);
  
  // Start celebration when page loads
  window.addEventListener('load', () => {
    setTimeout(startCelebration, 500);
  });
</script>
{% endif %}
