{% extends "base_admin.html" %}
{% block content %}
<h2>Add MID Exam Question</h2>
<form method="post">
    <div class="form-group">
        <label>Question Text</label>
        <textarea name="question_text" class="form-control" required></textarea>
    </div>
    <div class="form-group">
        <label>Bloom's Level</label>
        <input type="text" name="bloom_level" class="form-control" required>
    </div>
     <div class="form-group">
        <label>PI Level</label>
        <input type="text" name="pi_level" class="form-control" required>
    </div>
    <div class="form-group">
        <label>Total Marks</label>
        <input type="number" name="total_marks" class="form-control" required>
    </div>
    <div class="form-group">
        <label>CO</label>
        <select name="co_number" class="form-control" required>
            <option value="1">CO1</option>
            <option value="2">CO2</option>
            <option value="3">CO3</option>
            <option value="4">CO4</option>
            <option value="5">CO5</option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">Add Question</button>
    <a href="{{ url_for('mid_exam_questions') }}" class="btn btn-secondary">Cancel</a>
</form>
<script>
function addCOField() {
    var coFields = document.getElementById('co-fields');
    var newField = coFields.children[0].cloneNode(true);
    newField.querySelector('input').value = '';
    coFields.appendChild(newField);
}
</script>
{% endblock %}
