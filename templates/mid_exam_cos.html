{% extends "base_admin.html" %}
{% block content %}
<h2>MID Exam COs</h2>
<form method="post" class="mb-3">
    <div class="form-row">
        <div class="col">
            <input type="number" name="co_number" class="form-control" placeholder="CO Number" required>
        </div>
        <div class="col">
            <input type="text" name="co_description" class="form-control" placeholder="CO Description" required>
        </div>
        <div class="col">
            <button type="submit" class="btn btn-success">Add CO</button>
        </div>
    </div>
</form>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>CO Number</th>
            <th>Description</th>
        </tr>
    </thead>
    <tbody>
        {% for co in cos %}
        <tr>
            <td>{{ co.co_number }}</td>
            <td>{{ co.co_description }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('mid_exam_questions') }}" class="btn btn-secondary">Back to Questions</a>
{% endblock %}
