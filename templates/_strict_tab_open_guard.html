<script>
  (() => {
    const form = document.querySelector({{ guard_form_selector|default('form')|tojson }});
    if (!form) return;

    const contextLabel = {{ guard_context_label|default('assessment')|tojson }};
    const hiddenGraceMs = 5000;
    const hiddenMaxViolationMs = 120000;
    let alreadyHandled = false;
    let hiddenTimeoutId = null;
    let hiddenStartedAt = null;

    function ensureAutoSubmitPayload() {
      form.querySelectorAll('input[type="number"]').forEach((input) => {
        if (!input.value) input.value = "0";
      });

      form.querySelectorAll('input[type="text"], input:not([type]), textarea').forEach((input) => {
        if (!input.value) input.value = "0";
      });

      form.querySelectorAll("select").forEach((select) => {
        if (select.value) return;
        const fallbackOption = [...select.options].find((option) => option.value !== "");
        if (fallbackOption) select.value = fallbackOption.value;
      });

      form.querySelectorAll("[required]").forEach((field) => {
        if (
          (field.type === "radio" || field.type === "checkbox") &&
          field.name &&
          form.querySelector(`input[name="${field.name}"]:checked`)
        ) {
          return;
        }
        field.required = false;
      });

      if (!form.querySelector('input[name="auto_submit"]')) {
        const autoInput = document.createElement("input");
        autoInput.type = "hidden";
        autoInput.name = "auto_submit";
        autoInput.value = "1";
        form.appendChild(autoInput);
      }
    }

    function showAutoSubmitModal(onConfirm, reasonText) {
      const modal = document.createElement("div");
      modal.innerHTML = `
        <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;">
          <div style="background:#fff;padding:2em;border-radius:10px;max-width:420px;text-align:center;box-shadow:0 0 20px #0003;">
            <h4 style="color:#d9534f;">Auto-Submission Notice</h4>
            <p>${reasonText || `Because you tried to open another tab or window, this ${contextLabel} will be auto-submitted for anti-cheating protection.`}<br>
            Phone calls, temporary ads, and other brief interruptions will not trigger this.<br>
            <b>This dialog will remain until you click OK.</b></p>
            <button id="autoSubmitOkBtn" class="btn btn-danger mt-2">OK</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById("autoSubmitOkBtn").onclick = function () {
        modal.remove();
        if (onConfirm) onConfirm();
      };
    }

    function handleTabOpenAttempt(event, reasonText) {
      if (alreadyHandled) return;
      alreadyHandled = true;
      if (hiddenTimeoutId) {
        clearTimeout(hiddenTimeoutId);
        hiddenTimeoutId = null;
      }
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      ensureAutoSubmitPayload();
      showAutoSubmitModal(() => form.submit(), reasonText);
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const opensNewTab = (event.ctrlKey || event.metaKey) && (key === "t" || key === "n");
      if (opensNewTab) {
        handleTabOpenAttempt(event);
        return;
      }

      if ((event.ctrlKey || event.metaKey) && ["c", "v", "x"].includes(key)) {
        handleTabOpenAttempt(
          event,
          `Because you attempted to use a copy/paste shortcut during this ${contextLabel}, it will be auto-submitted for anti-cheating protection.`
        );
        return;
      }

      if (
        event.key === "PrintScreen" ||
        ((event.ctrlKey || event.metaKey) && event.shiftKey && ["s", "3", "4"].includes(key))
      ) {
        handleTabOpenAttempt(
          event,
          `Because you attempted to capture this ${contextLabel} screen, it will be auto-submitted for anti-cheating protection.`
        );
      }
    });

    ["copy", "cut", "paste"].forEach((eventName) => {
      document.addEventListener(eventName, (event) => {
        handleTabOpenAttempt(
          event,
          `Because you attempted to ${eventName} content from this ${contextLabel}, it will be auto-submitted for anti-cheating protection.`
        );
      });
    });

    document.addEventListener("click", (event) => {
      const link = event.target.closest("a");
      if (!link) return;

      const opensAnotherTab =
        link.target === "_blank" || event.ctrlKey || event.metaKey || event.shiftKey;
      if (opensAnotherTab) {
        handleTabOpenAttempt(event);
      }
    });

    document.addEventListener("auxclick", (event) => {
      if (event.button !== 1) return;
      const link = event.target.closest("a");
      if (link) handleTabOpenAttempt(event);
    });

    document.addEventListener("visibilitychange", () => {
      if (alreadyHandled) return;

      if (document.visibilityState === "hidden") {
        hiddenStartedAt = Date.now();
        hiddenTimeoutId = window.setTimeout(() => {
          const hiddenDuration = hiddenStartedAt ? Date.now() - hiddenStartedAt : hiddenGraceMs;
          if (hiddenDuration > hiddenMaxViolationMs) {
            return;
          }
          handleTabOpenAttempt(
            null,
            `Because you left this ${contextLabel} page for more than ${Math.floor(
              hiddenGraceMs / 1000
            )} seconds, it will be auto-submitted for anti-cheating protection.`
          );
        }, hiddenGraceMs);
        return;
      }

      if (hiddenTimeoutId) {
        clearTimeout(hiddenTimeoutId);
        hiddenTimeoutId = null;
      }

      if (hiddenStartedAt) {
        const hiddenDuration = Date.now() - hiddenStartedAt;
        if (hiddenDuration > hiddenMaxViolationMs) {
          hiddenStartedAt = null;
          return;
        }
      }
      hiddenStartedAt = null;
    });

    window.open = function () {
      handleTabOpenAttempt();
      return null;
    };

    document.addEventListener("contextmenu", (event) => event.preventDefault());
  })();
</script>
