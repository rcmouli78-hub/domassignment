<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create KDM LAB Quiz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      .criteria-card {
        border-left: 4px solid #0d6efd;
      }
      .withheld-box {
        transform: scale(1.2);
        margin-left: 6px;
      }
      textarea {
        resize: vertical;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary mb-0">
          <i class="fas fa-pen-to-square"></i> Create / Edit KDM LAB Quiz
        </h2>
        <a
          href="{{ url_for('kdm_lab_admin_dashboard') }}"
          class="btn btn-outline-secondary"
        >
          <i class="fas fa-arrow-left"></i> Back to KDM LAB Dashboard
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">
            <i class="fas fa-clipboard-list"></i> Quiz Configuration
          </h4>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Select Experiment</label>
                <select name="experiment_number" class="form-select" required>
                  {% for ex in experiments %}
                    <option value="{{ ex.experiment_number }}"
                      {% if experiment and ex.experiment_number == experiment.experiment_number %}selected{% endif %}>
                      EX-{{ ex.experiment_number }}
                    </option>
                  {% endfor %}
                </select>

              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold">Experiment Title</label>
                <input
                  type="text"
                  name="title"
                  class="form-control"
                  placeholder="Enter experiment title (optional)"
                  value="{{ experiment.title if experiment else '' }}"
                />
              </div>

              <div class="col-md-4">
                <label class="form-label fw-semibold">Number of Criteria</label>
                <input
                  type="number"
                  name="criteria_count"
                  class="form-control"
                  value="{{ lab_settings.num_criteria }}"
                  min="1"
                  required
                />
              </div>
            </div>

            <hr />
            <h5 class="text-primary mb-3">
              <i class="fas fa-list-check"></i> Enter Criteria Details
            </h5>

            {% for i in range(1, lab_settings.num_criteria + 1) %}
            <div class="card mb-4 criteria-card shadow-sm">
              <div class="card-body">
                <h6 class="fw-bold text-secondary mb-3">Criterion {{ i }}</h6>

                <!-- Question -->
                <div class="mb-3">
                  <label class="form-label">Question / Description</label>
                  <textarea
                    name="question_{{ i }}"
                    rows="2"
                    class="form-control"
                    placeholder="Enter question or criterion description"
                  >{{ existing_criteria[i-1].question_text if existing_criteria|length >= i else '' }}</textarea>
                </div>

                <!-- Options and Marks -->
                <div class="row mb-3">
                  <div class="col-md-6 mb-2">
                    <label class="form-label">Option A</label>
                    <input
                      type="text"
                      name="optionA_{{ i }}"
                      class="form-control"
                      placeholder="Option A text"
                      value="{{ existing_criteria[i-1].option_a if existing_criteria|length >= i else '' }}"
                    />
                  </div>
                  <div class="col-md-6 mb-2">
                    <label class="form-label">Marks for A</label>
                    <input
                      type="number"
                      step="0.1"
                      name="marksA_{{ i }}"
                      class="form-control"
                      value="{{ existing_criteria[i-1].marks_a if existing_criteria|length >= i else '1' }}"
                    />
                  </div>

                  <div class="col-md-6 mb-2">
                    <label class="form-label">Option B</label>
                    <input
                      type="text"
                      name="optionB_{{ i }}"
                      class="form-control"
                      placeholder="Option B text"
                      value="{{ existing_criteria[i-1].option_b if existing_criteria|length >= i else '' }}"
                    />
                  </div>
                  <div class="col-md-6 mb-2">
                    <label class="form-label">Marks for B</label>
                    <input
                      type="number"
                      step="0.1"
                      name="marksB_{{ i }}"
                      class="form-control"
                      value="{{ existing_criteria[i-1].marks_b if existing_criteria|length >= i else '2' }}"
                    />
                  </div>

                  <div class="col-md-6 mb-2">
                    <label class="form-label">Option C</label>
                    <input
                      type="text"
                      name="optionC_{{ i }}"
                      class="form-control"
                      placeholder="Option C text"
                      value="{{ existing_criteria[i-1].option_c if existing_criteria|length >= i else '' }}"
                    />
                  </div>
                  <div class="col-md-6 mb-2">
                    <label class="form-label">Marks for C</label>
                    <input
                      type="number"
                      step="0.1"
                      name="marksC_{{ i }}"
                      class="form-control"
                      value="{{ existing_criteria[i-1].marks_c if existing_criteria|length >= i else '3' }}"
                    />
                  </div>

                  <div class="col-md-6 mb-2">
                    <label class="form-label">Option D</label>
                    <input
                      type="text"
                      name="optionD_{{ i }}"
                      class="form-control"
                      placeholder="Option D text"
                      value="{{ existing_criteria[i-1].option_d if existing_criteria|length >= i else '' }}"
                    />
                  </div>
                  <div class="col-md-6 mb-2">
                    <label class="form-label">Marks for D</label>
                    <input
                      type="number"
                      step="0.1"
                      name="marksD_{{ i }}"
                      class="form-control"
                      value="{{ existing_criteria[i-1].marks_d if existing_criteria|length >= i else '4' }}"
                    />
                  </div>
                </div>

                <!-- Max Marks + Withhold -->
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label class="form-label">Maximum Marks</label>
                    <input
                      type="number"
                      step="0.1"
                      name="max_marks_{{ i }}"
                      class="form-control"
                      value="{{ existing_criteria[i-1].max_marks if existing_criteria|length >= i else '4' }}"
                    />
                  </div>
                  <div class="col-md-6 mb-3 d-flex align-items-center">
                    <input
                      type="checkbox"
                      name="withhold_{{ i }}"
                      value="1"
                      id="withhold_{{ i }}"
                      class="withheld-box"
                      {% if existing_criteria|length >= i and existing_criteria[i-1].withheld %}checked{% endif %}
                    />
                    <label
                      for="withhold_{{ i }}"
                      class="ms-2 mb-0 text-danger fw-semibold"
                    >
                      Withhold (Admin Only)
                    </label>
                  </div>

                </div>
              </div>
            </div>
            {% endfor %}


            <div class="text-center">
              <button type="submit" class="btn btn-success px-4">
                <i class="fas fa-save"></i> Save Quiz
              </button>
              <a
                href="{{ url_for('kdm_lab_admin_dashboard') }}"
                class="btn btn-outline-secondary px-4"
              >
                <i class="fas fa-times"></i> Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  <script>
    // 🔄 When admin changes experiment from dropdown, reload the page to clear previous data
    document.addEventListener("DOMContentLoaded", function () {
      const dropdown = document.querySelector("select[name='experiment_number']");
      if (dropdown) {
        dropdown.addEventListener("change", function () {
          const selected = this.value;
          if (selected) {
            // Reload page with selected experiment
            window.location.href = "{{ url_for('create_kdm_lab_quiz') }}?experiment=" + selected;
          }
        });
      }
    });
  </script>

  </body>
</html>
